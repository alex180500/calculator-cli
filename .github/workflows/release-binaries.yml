name: "Release Binaries"

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build"
        required: false
        type: string

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.meta.outputs.source_ref }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Determine source ref
        id: meta
        shell: pwsh
        run: |
          $sourceRef = if ("${{ github.event.inputs.git_ref }}" -ne "") {
            "${{ github.event.inputs.git_ref }}"
          } else {
            "${{ github.sha }}"
          }

          "source_ref=$sourceRef" >> $env:GITHUB_OUTPUT
          "source_sha=$sourceRef" >> $env:GITHUB_OUTPUT

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.source_ref }}

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path pyproject.toml -Pattern '^version = "(?<version>[^"]+)"$' | Select-Object -First 1
          if (-not $line) {
            throw "Unable to determine package version from pyproject.toml."
          }

          $version = $line.Matches[0].Groups["version"].Value
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag_name=v$version" >> $env:GITHUB_OUTPUT

  build:
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: calculator-linux-x86_64.tar.gz
            archive_format: tar.gz
          - runner: windows-latest
            asset_name: calculator-windows-x86_64.zip
            archive_format: zip
          - runner: macos-15-intel
            asset_name: calculator-macos-x86_64.tar.gz
            archive_format: tar.gz
          - runner: macos-15
            asset_name: calculator-macos-arm64.tar.gz
            archive_format: tar.gz
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.meta.outputs.source_ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PyInstaller and package
        run: python -m pip install --upgrade pip pyinstaller .

      - name: Build standalone executable
        run: python -m PyInstaller --clean --noconfirm --onefile --name calculator calculator_cli/cli.py

      - name: Package release asset
        id: package
        shell: pwsh
        run: |
          $distDir = Join-Path $PWD "dist"
          $binaryName = if ("${{ runner.os }}" -eq "Windows") { "calculator.exe" } else { "calculator" }
          $binaryPath = Join-Path $distDir $binaryName
          $aliasName = if ("${{ runner.os }}" -eq "Windows") { "c.exe" } else { "c" }
          $packageDir = Join-Path $env:RUNNER_TEMP "package"
          $assetPath = Join-Path $env:RUNNER_TEMP "${{ matrix.asset_name }}"

          if (-not (Test-Path $binaryPath)) {
            throw "Expected build output not found: $binaryPath"
          }

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item -LiteralPath $binaryPath -Destination (Join-Path $packageDir $binaryName)
          Copy-Item -LiteralPath $binaryPath -Destination (Join-Path $packageDir $aliasName)

          if ("${{ matrix.archive_format }}" -eq "zip") {
            Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath $assetPath -Force
          } else {
            tar -czf $assetPath -C $packageDir $binaryName $aliasName
          }

          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ steps.package.outputs.asset_path }}

  publish:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.meta.outputs.tag_name }}
          TARGET_SHA: ${{ needs.meta.outputs.source_sha }}
        shell: bash
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --target "$TARGET_SHA" --title "$TAG_NAME" --notes ""
          fi

          find release-assets -type f -print0 | while IFS= read -r -d '' file; do
            gh release upload "$TAG_NAME" "$file" --clobber
          done
