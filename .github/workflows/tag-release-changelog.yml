name: "Automatic Tag, Release and Changelog"

on:
  workflow_dispatch:
  push:
    paths:
      - pyproject.toml

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for version change or manual dispatch
        id: version_check
        shell: bash
        run: |
          current_version="$(
            grep -m1 '^version = ' pyproject.toml |
              cut -d'"' -f2
          )"

          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${current_version}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "✅ Workflow manually dispatched. Proceeding."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          elif git diff "${{ github.event.before }}" "${{ github.sha }}" -- 'pyproject.toml' | grep -q '^[+-]version ='; then
            echo "✅ Version has changed in pyproject.toml. Proceeding."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "🛑 Version has not changed. Skipping subsequent steps."
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.version_check.outputs.version_changed == 'true'
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.version_check.outputs.tag }}
          TAGGER_NAME: github-actions[bot]
          TAGGER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const tagName = process.env.TAG_NAME;
            const ref = `refs/tags/${tagName}`;

            try {
              await github.rest.git.getRef({ owner, repo, ref });
              core.info(`🛑 Tag ${tagName} already exists. Skipping tag creation.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const tagObject = await github.rest.git.createTag({
              owner,
              repo,
              tag: tagName,
              message: tagName,
              object: context.sha,
              type: "commit",
              tagger: {
                name: process.env.TAGGER_NAME,
                email: process.env.TAGGER_EMAIL,
                date: new Date().toISOString(),
              },
            });

            await github.rest.git.createRef({
              owner,
              repo,
              ref,
              sha: tagObject.data.sha,
            });

            core.info(`✅ Tag ${tagName} pushed.`);

      - name: Set up Node.js
        if: steps.version_check.outputs.version_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install changelog tools
        if: steps.version_check.outputs.version_changed == 'true'
        shell: bash
        run: |
          npm install --no-save conventional-changelog
          echo "✅ Dependencies installed."

      - name: Generate conventional changelog
        if: steps.version_check.outputs.version_changed == 'true'
        id: changelog
        shell: bash
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          npx conventional-changelog -p conventionalcommits -r 1 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "✅ Release notes generated."

      - name: Create GitHub release
        if: steps.version_check.outputs.version_changed == 'true'
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.version_check.outputs.tag }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const tagName = process.env.TAG_NAME;
            const notes = process.env.NOTES ?? "";

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tagName,
              name: tagName,
              body: notes,
              target_commitish: context.sha,
              draft: false,
              prerelease: false,
            });

            core.info(`✅ GitHub release ${tagName} created.`);
